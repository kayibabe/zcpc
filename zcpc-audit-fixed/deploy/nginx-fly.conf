server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20M;

    # Serve the React SPA — fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI backend.
    # Replace the proxy_pass value with your actual backend URL, e.g.:
    #   https://zcpc-api.fly.dev
    # If backend runs on a separate fly.dev app, use its internal DNS:
    #   http://zcpc-api.internal:8000
    location /api/ {
        proxy_pass http://zcpc-api.internal:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /fhir/ {
        proxy_pass http://zcpc-api.internal:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws {
        proxy_pass http://zcpc-api.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
