name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            registry.fly.io/${{ secrets.FLY_BACKEND_APP }}:latest
          secrets: |
            FLY_API_TOKEN=${{ secrets.FLY_API_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            registry.fly.io/${{ secrets.FLY_FRONTEND_APP }}:latest
          secrets: |
            FLY_API_TOKEN=${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io (Backend)
        uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          flyctl deploy --app ${{ secrets.FLY_BACKEND_APP }} --image registry.fly.io/${{ secrets.FLY_BACKEND_APP }}:latest
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io (Frontend)
        run: |
          flyctl deploy --app ${{ secrets.FLY_FRONTEND_APP }} --image registry.fly.io/${{ secrets.FLY_FRONTEND_APP }}:latest
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

