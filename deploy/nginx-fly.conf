server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.base44.app wss://*.base44.app;" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Fly.io internal DNS resolver. Resolving the backend hostname through a
    # variable + resolver defers DNS lookup to request time instead of startup.
    # Without this, nginx fails with "host not found in upstream" and the
    # container crash-loops whenever the backend (zcpc-api) is scaled to zero
    # (min_machines_running = 0) and its .internal record is absent.
    resolver [fdaa::3]:53 valid=5s ipv6=on;
    # The backend (zcpc-api) is kept always-on via min_machines_running = 1, so
    # .internal always resolves. Resolving through a variable still defers the
    # lookup to request time, so a transient DNS miss can't crash-loop nginx.
    set $backend zcpc-api.internal:8000;

    # Serve the React SPA — fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI backend.
    location /api/ {
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /fhir/ {
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws {
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
